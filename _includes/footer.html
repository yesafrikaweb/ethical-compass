<footer class="container footer-layout">
  <div class="footer-brand">
    <h4 style="margin-bottom: 0.5rem;">{{ site.title }}</h4>
    <p style="font-size: 0.875rem;">A strategic platform for institutional accountability.</p>
    <p style="font-size: 0.75rem; color: var(--color-text-muted); margin-top: 1rem;">&copy; {{ "now" | date: "%Y" }} {{ site.title }}. Professional usage only.</p>
  </div>
  <div class="footer-contact">
    <a href="mailto:{{ site.email }}"
      style="color: var(--color-text-bright); text-decoration: none; font-size: 0.875rem; font-weight: 500;">{{ site.email }}</a>
  </div>
</footer>
