title: Ethical Compass
email: intelligence@ethicalcompass.ai
description: >-
  A strategic platform for institutional accountability and proactive ethical oversight.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://ethicalcompass.ai" # the base hostname & protocol for your site

# Collections
collections:
  modules:
    output: true
    permalink: /modules/:path/

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude` key here will be automatically added to
# the internal "default list".
exclude:
  - .cursorrules
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
